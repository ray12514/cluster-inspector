schema_version: 1

compilers:
  - name: gcc
    cc: [gcc]
    cxx: [g++]
    fortran: [gfortran]
    env: [GCC_PATH]
    module_segments: [gcc, gcc-native]
    module_name_prefixes: [PrgEnv-gnu]
  - name: aocc
    cc: [amdclang, clang]
    cxx: [amdclang++, clang++]
    fortran: [flang]
    env: [AOCC_HOME, AOCC_ROOT, AOMP]
    roots: [/opt/AMD/aocc-compiler, /opt/AMD]
    module_segments: [aocc]
    module_name_prefixes: [PrgEnv-aocc]
  - name: oneapi
    cc: [icx]
    cxx: [icpx]
    fortran: [ifx]
    env: [ONEAPI_ROOT, CMPLR_ROOT]
    module_segments: [oneapi]
  - name: intel
    cc: [icc]
    cxx: [icpc]
    fortran: [ifort]
    env: [INTEL_PATH, INTEL_HOME]
    roots: [/opt/intel/oneapi/compiler, /opt/intel]
    module_segments: [intel]
    module_name_prefixes: [PrgEnv-intel]
  - name: nvhpc
    cc: [nvc]
    cxx: [nvc++]
    fortran: [nvfortran]
    env: [NVHPC_ROOT]
    module_segments: [nvhpc]
    module_name_prefixes: [PrgEnv-nvidia]
  - name: clang
    cc: [clang]
    cxx: [clang++]
    module_segments: [llvm, clang]
  - name: cce
    cc: [cc]
    cxx: [CC]
    fortran: [ftn]
    env: [CRAY_PE_CCE_PREFIX]
    version_env: [CRAY_CC_VERSION]
    module_segments: [cce]
    module_name_prefixes: [PrgEnv-cray]
    platform_owned: true
  - name: rocmcc
    cc: [amdclang]
    cxx: [amdclang++]
    fortran: [flang]
    env: [ROCM_PATH]
    module_segments: [rocmcc, rocm]
    module_name_prefixes: [PrgEnv-amd]
    platform_owned: true

mpi:
  - name: cray-mpich
    module_segments: [cray-mpich]
    env: [MPICH_DIR]
    version_env: [CRAY_MPICH_VERSION]
    platform_owned: true
  - name: openmpi
    module_segments: [openmpi]
    env: [MPI_HOME]
    version_commands:
      - [ompi_info, --parsable, --all]
      - [mpirun, --version]
  - name: mpich
    module_segments: [mpich]
    env: [MPICH_DIR, MPI_HOME]
    version_commands:
      - [mpichversion]
      - [mpirun, --version]
  - name: mvapich
    module_segments: [mvapich, mvapich2]
    env: [MPI_HOME]
    version_commands:
      - [mpirun, --version]
  - name: intel-mpi
    module_segments: [intel-mpi, impi]
    env: [I_MPI_ROOT, MPI_HOME]
    version_commands:
      - [mpirun, --version]

gpu_toolkits:
  - name: rocm
    module_segments: [rocm]
    env: [ROCM_PATH]
    commands: [hipcc]
    roots: [/opt/rocm]
    module_template: "rocm/{version}"
    component_candidates:
      # Core baseline used by the current profile contract and smoke fixtures.
      # These are inferred from a coherent ROCm root even when a minimal
      # container fixture does not include the real libraries.
      - { package: hip, prefix_suffix: hip, required: true }
      - { package: hsa-rocr-dev, required: true }
      - { package: comgr, required: true }
      - { package: rocblas, required: true }
      - { package: hipblas, required: true }
      - { package: hipsparse, required: true }
      - { package: rocprim, prefix_suffix: rocprim, required: true }
      - { package: llvm-amdgpu, required: true }

      # Additional ROCm package candidates present in the Spack v1.2.0 package
      # release set. These are emitted only when one of their probe paths exists
      # under the detected ROCm prefix.
      - { package: hipcc, probe_paths: [bin/hipcc] }
      - { package: hipblas-common, probe_paths: [include/hipblas-common] }
      - { package: hipblaslt, probe_paths: [lib/libhipblaslt.so] }
      - { package: hipcub, prefix_suffix: hipcub, probe_paths: [hipcub, include/hipcub] }
      - { package: hipfft, probe_paths: [lib/libhipfft.so] }
      - { package: hipfort, probe_paths: [hipfort, include/hipfort] }
      - { package: hipify-clang, probe_paths: [bin/hipify-clang] }
      - { package: hiprand, probe_paths: [lib/libhiprand.so] }
      - { package: hipsolver, probe_paths: [lib/libhipsolver.so] }
      - { package: hipsparselt, probe_paths: [lib/libhipsparselt.so] }
      - { package: hip-tests, probe_paths: [bin/hipInfo, bin/hipBusBandwidth] }
      - { package: hsa-amd-aqlprofile, probe_paths: [lib/libhsa-amd-aqlprofile64.so] }
      - { package: hsakmt-roct, probe_paths: [lib/libhsakmt.so] }
      - { package: miopen-hip, probe_paths: [lib/libMIOpen.so] }
      - { package: migraphx, probe_paths: [lib/libmigraphx.so] }
      - { package: rccl, probe_paths: [lib/librccl.so] }
      - { package: rocalution, probe_paths: [lib/librocalution.so] }
      - { package: rocblas, probe_paths: [lib/librocblas.so] }
      - { package: rocdecode, probe_paths: [lib/librocdecode.so] }
      - { package: rocfft, probe_paths: [lib/librocfft.so] }
      - { package: rocjpeg, probe_paths: [lib/librocjpeg.so] }
      - { package: rocminfo, probe_paths: [bin/rocminfo] }
      - { package: rocmlir, probe_paths: [bin/rocmlir-opt] }
      - { package: rocprim, prefix_suffix: rocprim, probe_paths: [rocprim, include/rocprim] }
      - { package: rocprofiler-compute, probe_paths: [bin/rocprof-compute] }
      - { package: rocprofiler-compute-viewer, probe_paths: [bin/rocprof-compute-viewer] }
      - { package: rocprofiler-dev, probe_paths: [lib/librocprofiler64.so] }
      - { package: rocprofiler-register, probe_paths: [lib/librocprofiler-register.so] }
      - { package: rocprofiler-sdk, probe_paths: [lib/librocprofiler-sdk.so] }
      - { package: rocprofiler-systems, probe_paths: [bin/rocprof-sys] }
      - { package: rocpydecode, probe_paths: [lib/librocpydecode.so] }
      - { package: rocrand, probe_paths: [lib/librocrand.so] }
      - { package: rocshmem, probe_paths: [lib/librocshmem.so] }
      - { package: rocsolver, probe_paths: [lib/librocsolver.so] }
      - { package: rocsparse, probe_paths: [lib/librocsparse.so] }
      - { package: rocthrust, prefix_suffix: rocthrust, probe_paths: [rocthrust, include/rocthrust] }
      - { package: roctracer-dev, probe_paths: [lib/libroctracer64.so] }
      - { package: roctracer-dev-api, probe_paths: [include/roctracer/roctracer.h] }
      - { package: rocwmma, probe_paths: [include/rocwmma] }
      - { package: rocm-bandwidth-test, probe_paths: [bin/rocm-bandwidth-test] }
      - { package: rocm-clang-ocl, probe_paths: [bin/clang-ocl] }
      - { package: rocm-cmake, probe_paths: [lib/cmake/rocm-cmake] }
      - { package: rocm-core, probe_paths: [.info/version] }
      - { package: rocm-dbgapi, probe_paths: [lib/librocm-dbgapi.so] }
      - { package: rocm-debug-agent, probe_paths: [bin/rocm-debug-agent] }
      - { package: rocm-device-libs, probe_paths: [amdgcn/bitcode, lib/llvm/lib/clang] }
      - { package: rocm-examples, probe_paths: [share/rocm-examples] }
      - { package: rocm-gdb, probe_paths: [bin/rocgdb] }
      - { package: rocm-opencl, probe_paths: [lib/libamdocl64.so] }
      - { package: rocm-openmp-extras, probe_paths: [lib/libomptarget.rtl.amdgpu.so] }
      - { package: rocm-smi-lib, probe_paths: [lib/librocm_smi64.so] }
      - { package: rocm-tensile, probe_paths: [Tensile, lib/cmake/Tensile] }
      - { package: rocm-validation-suite, probe_paths: [bin/rocm_validation_suite] }
  - name: cudatoolkit
    module_segments: [cuda, cudatoolkit]
    env: [CUDA_HOME, CUDA_PATH]
    commands: [nvcc]
    roots: [/usr/local/cuda]
    module_template: "cudatoolkit/{version}"
  - name: nvhpc
    module_segments: [nvhpc]
    env: [NVHPC_ROOT]
    commands: [nvc]
    roots: [/opt/nvidia/hpc_sdk]
    module_template: "nvhpc/{version}"

system_externals:
  default_focus: [openssl, curl, cray-libsci]
  external_candidates:
    - name: cray-libsci
      provider_family: platform
      env: [CRAY_LIBSCI_PREFIX_DIR]
      version_env: [CRAY_LIBSCI_VERSION]
      roots: [/opt/cray/pe/libsci]
      module_template: "cray-libsci/{version}"

filesystem:
  shared_probe_roots: [/shared, /apps, /gpfs, /lustre, /project, /projects, /work]
  scratch_probe_roots: [/scratch, /local_scratch]

fabric:
  cxi_device_paths: [/sys/class/cxi, /dev/cxi]
  cxi_userspace_roots: [/opt/cray/pe/cxi]
  infiniband_class_path: /sys/class/infiniband
  userspace_candidates:
    - name: libfabric
      commands: [fi_info]
      version_commands:
        - [fi_info, --version]
      module_segments: [libfabric]
    - name: ucx
      commands: [ucx_info]
      version_commands:
        - [ucx_info, -v]
      module_segments: [ucx]

platforms:
  cray-pe:
    platform_family: cray-pe
    evidence_paths: [/opt/cray/pe]
    evidence_env: [CRAYPE_VERSION, PE_ENV]
    evidence_loaded_module_segments: [prgenv-, cray-mpich, craype-, cray-libsci]
    owned_prefixes: [/opt/cray]
    module_categories: [cray_pe]
    module_segments: [cray-mpich, cray-libsci]
    module_name_prefixes: [prgenv-, craype-]
    pe_root: /opt/cray/pe
    provider_env_mappings:
      PE_ENV:
        GNU: gcc
        CRAY: cce
        AOCC: aocc
        INTEL: intel
        AMD: rocmcc
        NVIDIA: nvhpc
