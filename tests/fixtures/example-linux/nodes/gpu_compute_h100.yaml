name: gpu_compute_h100
role: runtime
description: "NVIDIA GPU compute nodes"
cpu:
  detected: x86_64_v4
  preferred: x86_64_v4
  alternates: [x86_64_v3, x86_64_v2, x86_64]
gpu:
  vendor: nvidia
  driver_version: "550.54"
  toolkit_ceiling: "12.4"
  arch_target: sm_90
  cuda_compat_available: true
build_stage:
  - path: /local_scratch/$user/spack-stage
    visibility: compute-only
    writable: true
    throughput_class: fast
